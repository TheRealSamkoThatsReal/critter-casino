<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241f44"/>
      <stop offset="1" stop-color="#12101f"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8ab4"/>
      <stop offset="1" stop-color="#ff3b6b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="250" r="190" fill="#ff4d8d" opacity="0.16"/>
  <!-- pixel creature, drawn as a grid of squares (32px cells) -->
  <g shape-rendering="crispEdges">
    <!-- ears -->
    <rect x="160" y="128" width="32" height="32" fill="#6c5cff"/>
    <rect x="320" y="128" width="32" height="32" fill="#6c5cff"/>
    <rect x="160" y="160" width="32" height="32" fill="url(#body)"/>
    <rect x="320" y="160" width="32" height="32" fill="url(#body)"/>
    <!-- head row 1 -->
    <rect x="192" y="160" width="128" height="32" fill="url(#body)"/>
    <!-- body block -->
    <rect x="160" y="192" width="192" height="128" fill="url(#body)"/>
    <!-- bottom taper -->
    <rect x="192" y="320" width="128" height="32" fill="#d83a76"/>
    <!-- eyes -->
    <rect x="192" y="208" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="208" width="40" height="40" fill="#ffffff"/>
    <rect x="208" y="216" width="20" height="24" fill="#1a1730"/>
    <rect x="296" y="216" width="20" height="24" fill="#1a1730"/>
    <!-- cheek accents -->
    <rect x="176" y="272" width="24" height="24" fill="#ffd75e"/>
    <rect x="312" y="272" width="24" height="24" fill="#ffd75e"/>
  </g>
  <!-- casino chip -->
  <g transform="translate(360,360)">
    <circle r="64" fill="#ffd75e" stroke="#5a4a14" stroke-width="8"/>
    <circle r="40" fill="none" stroke="#5a4a14" stroke-width="8" stroke-dasharray="14 12"/>
    <text x="0" y="14" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#7a5a14" text-anchor="middle">$</text>
  </g>
</svg>
